<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bayes MCP — embed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2EFE9;
    --ink: #000000;
    --ink-soft: rgba(0,0,0,0.8);
    --muted: #657180;
    --cream: #F7F7F2;
    --card: #FFFFFF;
    --gold: #9A6F24;
    --gold-bg: #EBE092;
    --accent-orange: #FF8400;
    --accent-blue: #1067FE;
    --border-soft: #DBCCAF;
    --ok: #1F7A3F;
    --ok-soft: #DDEBDF;
    --warn: #9A4A04;
    --warn-soft: #FCE6CC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--ink); }
  a { color: inherit; text-decoration: none; }

  /* ---------- STAGE ---------- */
  .embed-stage {
    display: grid;
    grid-template-columns: minmax(440px, 46%) 1fr;
    width: 100vw; height: 100vh;
  }

  /* ---------- LEFT (dark) ---------- */
  .embed-left {
    background: var(--ink);
    color: #fff;
    padding: 32px 48px 24px;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .embed-tabs {
    display: inline-flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    align-self: flex-start;
  }
  .emb-tab {
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.55);
    padding: 9px 18px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s ease;
    letter-spacing: -0.005em;
  }
  .emb-tab:hover { color: #fff; }
  .emb-tab.active { background: #fff; color: var(--ink); }

  .embed-content {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 24px 0;
    max-width: 540px;
  }
  .info-domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
    font-weight: 600;
    margin-bottom: 22px;
    animation: fadeUp .35s ease;
  }
  .info-title {
    font-size: clamp(40px, 5.4vw, 86px);
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.035em;
    margin-bottom: 28px;
    text-transform: uppercase;
    animation: fadeUp .4s ease;
  }
  .info-desc {
    font-size: 17px;
    color: rgba(255,255,255,0.75);
    line-height: 1.55;
    margin-bottom: 0;
    animation: fadeUp .45s ease;
  }
  .info-divider {
    height: 1px;
    border: none;
    background: rgba(255,255,255,0.08);
    margin: 32px 0 22px;
  }
  .info-demo-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.14em;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .info-demo-desc {
    font-size: 15px;
    font-style: italic;
    color: rgba(255,255,255,0.65);
    line-height: 1.55;
    margin-bottom: 24px;
  }
  .info-scenarios {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .info-scn {
    padding: 7px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 100px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
    letter-spacing: -0.005em;
  }
  .info-scn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
  .info-scn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); color: #fff; }

  .embed-foot {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 16px;
  }
  .embed-home {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12.5px;
    color: rgba(255,255,255,0.5);
    transition: color .15s ease;
  }
  .embed-home:hover { color: #fff; }
  .embed-home img { height: 20px; width: auto; opacity: 0.85; filter: invert(1) brightness(2); }
  .embed-home-arrow { opacity: 0.6; }

  .embed-lang-mini {
    display: inline-flex; gap: 1px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
  }
  .embed-lang-btn {
    padding: 5px 8px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    border-radius: 5px;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.15s ease;
  }
  .embed-lang-btn:hover { color: #fff; }
  .embed-lang-btn.active { background: rgba(255,255,255,0.12); color: #fff; }

  /* ---------- RIGHT (cream) ---------- */
  .embed-right {
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .embed-mode {
    position: absolute;
    top: 24px; right: 28px;
    display: flex;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 100px;
    padding: 3px;
    z-index: 10;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .mode-btn {
    padding: 7px 16px;
    border: none;
    background: transparent;
    border-radius: 100px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    color: var(--muted);
    transition: all 0.15s ease;
    letter-spacing: -0.005em;
  }
  .mode-btn:hover { color: var(--ink); }
  .mode-btn.active { background: var(--ink); color: #fff; }

  .embed-chat {
    flex: 1;
    padding: 92px 64px 56px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 22px;
    font-size: 16px;
    color: var(--ink);
    scroll-behavior: smooth;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .embed-chat > * { flex-shrink: 0; }
  .embed-chat::-webkit-scrollbar { width: 8px; }
  .embed-chat::-webkit-scrollbar-track { background: transparent; }
  .embed-chat::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 4px; }

  /* Greeting + user msg */
  .greet {
    font-size: 17px;
    color: var(--ink-soft);
    margin-bottom: 6px;
    animation: fadeUp .35s ease;
  }
  .greet .wave {
    display: inline-block;
    animation: wave 1.8s ease-in-out infinite;
    transform-origin: 70% 70%;
  }
  @keyframes wave {
    0%, 60%, 100% { transform: rotate(0deg); }
    10% { transform: rotate(14deg); }
    20% { transform: rotate(-8deg); }
    30% { transform: rotate(14deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(10deg); }
  }

  .umsg {
    align-self: flex-end;
    background: var(--ink);
    color: #fff;
    padding: 11px 16px;
    border-radius: 18px;
    border-bottom-right-radius: 6px;
    font-size: 15px;
    line-height: 1.45;
    max-width: 78%;
    animation: fadeUp .35s ease;
  }

  /* Tool call badge */
  .toolbadge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 9px;
    background: var(--gold-bg);
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    align-self: flex-start;
    animation: fadeUp .35s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .tb-icons {
    display: inline-flex;
    align-items: center;
  }
  .tb-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: grid; place-items: center;
    font-size: 10px; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    border: 2px solid var(--gold-bg);
    margin-right: -7px;
    letter-spacing: -0.02em;
  }
  .tb-icon:last-child { margin-right: 0; }
  .tb-icon svg { width: 12px; height: 12px; }
  .tb-icon.brand { background: var(--ink); color: var(--gold-bg); }
  .tb-icon.warn { background: var(--warn); color: #fff; }
  .tb-icon.blue { background: var(--accent-blue); color: #fff; }
  .tb-label { padding-left: 2px; letter-spacing: -0.005em; }

  /* AI response */
  .amsg {
    font-size: 16px;
    line-height: 1.62;
    animation: fadeUp .35s ease;
  }
  .amsg .lead {
    color: var(--ink);
    margin-bottom: 6px;
  }
  .amsg .lead strong { font-weight: 700; }
  .amsg h3 {
    font-size: 15.5px;
    font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    margin: 22px 0 10px;
    color: var(--ink);
  }
  .amsg h3 .h-ico {
    width: 22px; height: 22px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .amsg h3 .h-ico svg { width: 18px; height: 18px; }
  .amsg h3.ok .h-ico { color: var(--ok); }
  .amsg h3.imp .h-ico { color: var(--gold); }
  .amsg h3.warn .h-ico { color: var(--warn); }
  .amsg h3.info .h-ico { color: var(--accent-blue); }
  .amsg ul {
    list-style: none; padding: 0;
    margin: 0 0 4px 32px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .amsg ul li {
    position: relative;
    padding-left: 16px;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.55;
  }
  .amsg ul li::before {
    content: '•';
    position: absolute;
    left: 0; top: -1px;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
  }
  .amsg p { color: var(--ink); margin: 8px 0 4px; }
  .amsg .src-cite {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .amsg .src-cite-arrow { color: var(--accent-blue); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .typing {
    display: inline-flex; gap: 5px;
    padding: 6px 0;
  }
  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes blink {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ---------- MOBILE ---------- */
  @media (max-width: 900px) {
    html, body { overflow: auto; height: auto; }
    .embed-stage {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }
    .embed-left {
      padding: 24px 24px 32px;
      min-height: auto;
    }
    .embed-content {
      flex: 0 0 auto;
      padding: 28px 0 8px;
      max-width: none;
    }
    .info-title {
      font-size: clamp(40px, 9vw, 56px);
      letter-spacing: -0.025em;
    }
    .info-desc { font-size: 16px; }
    .info-demo-desc { font-size: 14px; }
    .embed-foot { margin-top: 24px; }
    .embed-right {
      min-height: 90vh;
      display: flex;
    }
    .embed-chat {
      padding: 72px 22px 40px;
      max-width: none;
    }
    .embed-mode { top: 16px; right: 16px; }
  }

  @media (max-width: 600px) {
    .embed-left { padding: 20px 20px 28px; }
    .info-title { font-size: 38px; }
    .emb-tab { padding: 7px 14px; font-size: 12.5px; }
    .embed-mode { top: 14px; right: 14px; }
    .mode-btn { padding: 6px 12px; font-size: 12px; }
    .embed-chat { padding: 64px 18px 32px; gap: 18px; }
    .umsg { font-size: 14.5px; padding: 10px 14px; }
    .amsg { font-size: 15px; }
    .amsg ul li, .amsg h3, .amsg p { font-size: 14.5px; }
    .greet { font-size: 16px; }
    .toolbadge { font-size: 13px; }
  }
</style>
</head>
<body>

<main class="embed-stage">
  <!-- LEFT -->
  <aside class="embed-left">
    <nav class="embed-tabs" id="embed-tabs"></nav>

    <div class="embed-content" id="embed-content">
      <div class="info-domain" id="info-domain"></div>
      <h1 class="info-title" id="info-title"></h1>
      <p class="info-desc" id="info-desc"></p>
      <hr class="info-divider" />
      <div class="info-demo-tag" id="info-demo-tag">DEMO</div>
      <p class="info-demo-desc" id="info-demo-desc"></p>
      <div class="info-scenarios" id="info-scenarios"></div>
    </div>

    <div class="embed-foot">
      <a class="embed-home" href="https://www.bayesimpact.org" target="_blank" rel="noopener">
        <img src="bi-colors.svg" alt="Bayes Impact" />
        <span>bayesimpact.org</span>
        <span class="embed-home-arrow"><svg viewBox="0 0 14 14" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l5-5"/><path d="M5 4h5v5"/></svg></span>
      </a>
      <div class="embed-lang-mini" id="lang-mini"></div>
    </div>
  </aside>

  <!-- RIGHT -->
  <section class="embed-right">
    <div class="embed-mode" id="mode-toggle">
      <button class="mode-btn" data-mode="without">Sans MCP</button>
      <button class="mode-btn active" data-mode="with">Avec MCP</button>
    </div>
    <div class="embed-chat" id="chat"></div>
  </section>
</main>

<script>
// ---------- LANG ----------
const LANG_KEY = 'bayes-mcp-demo-lang';
const LANGS = [
  { code: 'en', label: 'EN' },
  { code: 'fr', label: 'FR' },
  { code: 'es', label: 'ES' },
  { code: 'de', label: 'DE' },
  { code: 'it', label: 'IT' },
  { code: 'pl', label: 'PL' }
];
const VALID_LANGS = LANGS.map(l => l.code);
let LANG = 'fr';
try {
  const saved = localStorage.getItem(LANG_KEY);
  if (VALID_LANGS.includes(saved)) LANG = saved;
} catch (e) {}

function L(field) {
  if (field == null) return '';
  if (typeof field === 'string') return field;
  return field[LANG] ?? field.fr ?? field.en ?? '';
}

// ---------- COMMON UI STRINGS ----------
const UI = {
  modeWith:    { en: 'With MCP',    fr: 'Avec MCP',  es: 'Con MCP',   de: 'Mit MCP',    it: 'Con MCP',  pl: 'Z MCP' },
  modeWithout: { en: 'Without MCP', fr: 'Sans MCP',  es: 'Sin MCP',   de: 'Ohne MCP',   it: 'Senza MCP',pl: 'Bez MCP' },
  demoTag:     { en: 'DEMO',        fr: 'DÉMO',      es: 'DEMO',      de: 'DEMO',       it: 'DEMO',     pl: 'DEMO' },
  greet:       { en: 'Hello there <span class="wave">👋</span> How can I help you today?',
                 fr: 'Bonjour <span class="wave">👋</span> Comment puis-je vous aider ?',
                 es: 'Hola <span class="wave">👋</span> ¿En qué puedo ayudarte?',
                 de: 'Hallo <span class="wave">👋</span> Wie kann ich helfen?',
                 it: 'Ciao <span class="wave">👋</span> Come posso aiutarti?',
                 pl: 'Cześć <span class="wave">👋</span> Jak mogę pomóc?' },
  openSource:  { en: 'View source document',
                 fr: 'Voir le document source',
                 es: 'Ver el documento fuente',
                 de: 'Quelldokument ansehen',
                 it: 'Apri il documento fonte',
                 pl: 'Zobacz dokument źródłowy' }
};

// ---------- DEMOS ----------
const DEMOS = [
  // 0: HEALTHCARE
  {
    id: 'health',
    tab:    { en: 'Healthcare',     fr: 'Santé',           es: 'Salud',         de: 'Gesundheit',     it: 'Salute',         pl: 'Zdrowie' },
    domain: { en: 'NICE · MHRA',    fr: 'HAS · ANSM',      es: 'AEMPS',         de: 'G-BA · BfArM',   it: 'AIFA · ISS',     pl: 'URPL · AOTMiT' },
    title:  { en: 'Health<br>compliance',
              fr: 'Conformité<br>santé',
              es: 'Cumplimiento<br>sanitario',
              de: 'Gesundheits-<br>konformität',
              it: 'Conformità<br>sanitaria',
              pl: 'Zgodność<br>medyczna' },
    desc:   { en: 'AI assistants that verify every medical recommendation against national clinical guidelines and drug safety alerts, before it ever reaches the patient.',
              fr: "Des assistants IA qui vérifient chaque recommandation médicale contre les recommandations nationales et les alertes de sécurité, avant qu'elle n'arrive au patient.",
              es: 'Asistentes de IA que verifican cada recomendación médica contra las guías clínicas y alertas de seguridad nacionales, antes de que llegue al paciente.',
              de: 'KI-Assistenten, die jede medizinische Empfehlung gegen nationale klinische Leitlinien und Sicherheitswarnungen prüfen, bevor sie den Patienten erreicht.',
              it: 'Assistenti IA che verificano ogni raccomandazione medica contro linee guida cliniche e allerte di sicurezza nazionali, prima che raggiunga il paziente.',
              pl: 'Asystenci AI weryfikujący każdą rekomendację medyczną względem krajowych wytycznych klinicznych i ostrzeżeń bezpieczeństwa, zanim dotrze do pacjenta.' },
    demoDesc: { en: 'Medical agent that cross-checks recommendations against the local health authority and the medicines regulator, and surfaces non-compliance with the source document.',
                fr: "Agent médical qui croise chaque recommandation avec l'autorité de santé locale et l'agence du médicament, et signale toute non-conformité avec son document source.",
                es: 'Agente médico que coteja recomendaciones con la autoridad sanitaria local y el regulador del medicamento, y señala el incumplimiento con el documento fuente.',

function wait(ms) {
  return new Promise(res => {
    const t = setTimeout(res, ms);
    timers.push(t);
  });
}
function clearTimers() {
  timers.forEach(clearTimeout);
  timers = [];
}

// ---------- RENDER LEFT ----------
function renderTabs() {
  document.getElementById('embed-tabs').innerHTML = DEMOS.map((d, i) => `
    <button class="emb-tab ${i === demoIdx ? 'active' : ''}" data-i="${i}">${L(d.tab)}</button>
  `).join('');
  document.querySelectorAll('.emb-tab').forEach(b => {
    b.addEventListener('click', () => {
      const i = +b.dataset.i;
      if (i === demoIdx) return;
      demoIdx = i;
      scnIdx = 0;
      renderLeft();
      schedulePlay();
    });
  });
}

function renderLeft() {
  const d = DEMOS[demoIdx];
  document.getElementById('info-domain').textContent = L(d.domain);
  document.getElementById('info-title').innerHTML = L(d.title);
  document.getElementById('info-desc').textContent = L(d.desc);
  document.getElementById('info-demo-tag').textContent = L(UI.demoTag);
  document.getElementById('info-demo-desc').textContent = L(d.demoDesc);
  document.getElementById('info-scenarios').innerHTML = d.scenarios.map((s, i) => `
    <button class="info-scn ${i === scnIdx ? 'active' : ''}" data-i="${i}">${L(s.label)}</button>
  `).join('');
  document.querySelectorAll('.info-scn').forEach(b => {
    b.addEventListener('click', () => {
      const i = +b.dataset.i;
      if (i === scnIdx) return;
      scnIdx = i;
      document.querySelectorAll('.info-scn').forEach(x => x.classList.toggle('active', +x.dataset.i === scnIdx));
      schedulePlay();
    });
  });
  // tabs active state
  document.querySelectorAll('.emb-tab').forEach(b => b.classList.toggle('active', +b.dataset.i === demoIdx));
}

function renderModeLabels() {
  document.querySelectorAll('#mode-toggle .mode-btn').forEach(b => {
    b.textContent = L(b.dataset.mode === 'with' ? UI.modeWith : UI.modeWithout);
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function renderLang() {
  document.getElementById('lang-mini').innerHTML = LANGS.map(l => `
    <button class="embed-lang-btn ${l.code === LANG ? 'active' : ''}" data-lang="${l.code}">${l.label}</button>
  `).join('');
  document.querySelectorAll('.embed-lang-btn').forEach(b => {
    b.addEventListener('click', () => {
      const next = b.dataset.lang;
      if (next === LANG) return;
      LANG = next;
      try { localStorage.setItem(LANG_KEY, LANG); } catch (e) {}
      document.documentElement.lang = LANG;
      renderTabs();
      renderLeft();
      renderModeLabels();
      renderLang();
      schedulePlay();
    });
  });
}

// ---------- CHAT PLAY ----------
function appendChat(html) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  while (wrap.firstChild) chat.appendChild(wrap.firstChild);
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

function resetChat() {
  clearTimers();
  isPlaying = false;
  document.getElementById('chat').innerHTML = '';
}

let scheduleTimer = null;
function schedulePlay() {
  if (scheduleTimer) clearTimeout(scheduleTimer);
  scheduleTimer = setTimeout(play, 120);
}

async function play() {
  resetChat();
  isPlaying = true;
  const demo = DEMOS[demoIdx];
  const scn = demo.scenarios[scnIdx];

  // greeting
  appendChat(`<div class="greet">${L(UI.greet)}</div>`);
  await wait(550);

  // user msg
  appendChat(`<div class="umsg">${L(scn.question)}</div>`);
  await wait(700);

  // typing
  const chat = document.getElementById('chat');
  const typing = document.createElement('div');
  typing.className = 'amsg';
  typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(typing);
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
  await wait(900);
  typing.remove();

  if (mode === 'with') {
    // tool badge
    const sources = demo.sources[LANG] || demo.sources.fr;
    const iconsHtml = sources.map(s => `<span class="tb-icon ${s.cls || ''}">${s.code}</span>`).join('');
    appendChat(`
      <div class="toolbadge">
        <span class="tb-icons">${iconsHtml}</span>
        <span class="tb-label">${L(demo.sourceLabel)}</span>
      </div>
    `);
    await wait(700);
    // response
    appendChat(`<div class="amsg">${L(scn.with)}</div>`);
  } else {
    appendChat(`<div class="amsg">${L(scn.without)}</div>`);
  }

  isPlaying = false;
}

// ---------- WIRE ----------
document.querySelectorAll('#mode-toggle .mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    const next = b.dataset.mode;
    if (next === mode) return;
    mode = next;
    renderModeLabels();
    schedulePlay();
  });
});

// resize: keep chat scrolled
let resizeT = null;
window.addEventListener('resize', () => {
  if (resizeT) clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    const c = document.getElementById('chat');
    if (c) c.scrollTop = c.scrollHeight;
  }, 80);
});

// init
document.documentElement.lang = LANG;
renderTabs();
renderLeft();
renderModeLabels();
renderLang();
window.addEventListener('load', () => setTimeout(play, 500));
</script>
</body>
</html>
